<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线上问题周报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 32px; }
        .report-list { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .report-item { padding: 15px; border-bottom: 1px solid #e9ecef; display: flex; justify-content: space-between; align-items: center; }
        .report-item:last-child { border-bottom: none; }
        .report-item a { color: #667eea; text-decoration: none; font-size: 18px; font-weight: 500; }
        .report-item a:hover { text-decoration: underline; }
        .report-date { color: #6c757d; font-size: 14px; }
        .empty { text-align: center; color: #6c757d; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 线上问题周报</h1>
        <div class="report-list" id="reportList">
            <div class="empty">加载中...</div>
        </div>
    </div>
    
    <script>
        // 报告列表（手动维护）
        const reports = [
            { file: '报告_20260425-20260501.html', title: '2026-04-25 ~ 2026-05-01' },
            { file: '报告_20260418-20260424.html', title: '2026-04-18 ~ 2026-04-24' },
            { file: '报告_20260411-20260417.html', title: '2026-04-11 ~ 2026-04-17' },
            { file: '报告_20260404-20260410.html', title: '2026-04-04 ~ 2026-04-10' }
        ];
        
        const listEl = document.getElementById('reportList');
        
        if (reports.length === 0) {
            listEl.innerHTML = '<div class="empty">暂无报告</div>';
        } else {
            listEl.innerHTML = reports.map(r => `
                <div class="report-item">
                    <a href="${r.file}" target="_blank">📄 ${r.title}</a>
                    <span class="report-date">${r.file}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
